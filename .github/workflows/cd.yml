name: CD — Deploy to Azure

on:
  # Auto-deploy when CI passes on main
  workflow_run:
    workflows: ["CI — Lint & Test"]
    branches: ["main", "master"]
    types: [completed]

  # Or trigger manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy infrastructure instead of deploying?"
        required: false
        default: "false"

jobs:
  deploy:
    # Only run if CI passed (skip on manual trigger check)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      # Opt into Node 24 ahead of the June 16, 2026 default switch
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH dir
        run: mkdir -p ~/.ssh

      # ── Terraform ───────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # Remote state so re-runs don't collide with existing resources.
      # Needs the one-time bootstrap in .github/SECRETS.md + TFSTATE_* secrets.
      - name: Configure remote state backend
        env:
          TFSTATE_RG: ${{ secrets.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_SA: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
        run: |
          if [ -n "$TFSTATE_SA" ]; then
            cat > terraform/backend_override.tf <<EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "$TFSTATE_RG"
              storage_account_name = "$TFSTATE_SA"
              container_name       = "tfstate"
              key                  = "llm-eval.tfstate"
            }
          }
          EOF
            echo "Remote state backend configured."
          else
            echo "::warning::TFSTATE_* secrets not set — using local state. Re-deploys will fail once infra exists. See .github/SECRETS.md."
          fi

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply (or Destroy)
        working-directory: terraform
        run: |
          if [ "${{ github.event.inputs.destroy }}" == "true" ]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve tfplan
          fi

      - name: Extract VM IP and SSH key from Terraform
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: terraform
        id: get_ip
        run: |
          echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT
          # Extract the auto-generated private key — no SSH secret needed
          terraform output -raw private_key_pem > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # ── Docker deploy ────────────────────────────────────────────────────────
      - name: Write .env file
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"            >> .env

      - name: Install rsync
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: sudo apt-get install -y rsync

      - name: Add VM to known hosts
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: ssh-keyscan -H ${{ steps.get_ip.outputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Deploy with Docker
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: bash deploy/docker_deploy.sh ${{ steps.get_ip.outputs.vm_ip }}

      - name: Upload evaluation results
        if: ${{ github.event.inputs.destroy != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: |
            outputs/*.csv
            outputs/meyar.db
          retention-days: 30
