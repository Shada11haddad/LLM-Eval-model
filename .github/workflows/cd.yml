name: CD — Deploy to Azure

on:
  # Auto-deploy when CI passes on main
  workflow_run:
    workflows: ["CI — Lint & Test"]
    branches: ["main", "master"]
    types: [completed]

  # Or trigger manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy infrastructure instead of deploying?"
        required: false
        default: "false"

jobs:
  deploy:
    # Only run if CI passed (skip on manual trigger check)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      # TF_VAR_location and TF_VAR_vm_size are set dynamically
      # by the "Find available region + VM size" step below.
      # Opt into Node 24 ahead of the June 16, 2026 default switch
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH dir
        run: mkdir -p ~/.ssh

      # ── Terraform ───────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # Remote state so re-runs don't collide with existing resources.
      # Needs the one-time bootstrap in .github/SECRETS.md + TFSTATE_* secrets.
      - name: Configure remote state backend
        env:
          TFSTATE_RG: ${{ secrets.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_SA: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
        run: |
          if [ -n "$TFSTATE_SA" ]; then
            cat > terraform/backend_override.tf <<EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "$TFSTATE_RG"
              storage_account_name = "$TFSTATE_SA"
              container_name       = "tfstate"
              key                  = "llm-eval.tfstate"
            }
          }
          EOF
            echo "Remote state backend configured."
          else
            echo "::warning::TFSTATE_* secrets not set — using local state. Re-deploys will fail once infra exists. See .github/SECRETS.md."
          fi

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # Log in once — credentials persist in ~/.azure for all subsequent az steps.
      - name: Azure CLI login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none

      # Find the first region + SKU that this subscription can actually use.
      # az vm list-skus (no --all) already omits subscription-blocked SKUs.
      # We grep for the SKU name — if it appears in output, it's usable.
      - name: Find available region + VM size
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: |
          REGIONS=(westus2 eastus2 westus eastus centralus northcentralus southcentralus westeurope northeurope)

          # All 4 vCPU / ≥16 GB candidates across multiple families
          SKUS=(
            Standard_B4ms
            Standard_D4as_v5 Standard_D4s_v5
            Standard_D4as_v4 Standard_D4s_v4
            Standard_D4_v3   Standard_D4s_v3
            Standard_E2as_v5 Standard_E2s_v5
            Standard_E2as_v4 Standard_E2s_v4
            Standard_D4a_v4
          )

          CHOSEN_LOC=""
          CHOSEN_SKU=""

          # Debug: show what's available in first region
          echo "=== Available VM SKUs in westus2 (sample) ==="
          az vm list-skus --location westus2 --output tsv 2>/dev/null \
            | awk -F'\t' '{print $1}' | grep -E "Standard_[BDE][248]" | sort -u | head -30 || true
          echo "=============================================="

          for LOC in "${REGIONS[@]}"; do
            for SKU in "${SKUS[@]}"; do
              RESULT=$(az vm list-skus --location "$LOC" --size "$SKU" \
                --output tsv 2>/dev/null | grep -c "$SKU" || true)
              if [ "$RESULT" -gt "0" ]; then
                echo "✓ Found: $SKU in $LOC"
                CHOSEN_LOC="$LOC"
                CHOSEN_SKU="$SKU"
                break 2
              fi
            done
          done

          if [ -z "$CHOSEN_LOC" ]; then
            echo "::error::No usable VM SKU found. Check the debug output above for what your subscription supports."
            exit 1
          fi

          echo "TF_VAR_location=$CHOSEN_LOC" >> $GITHUB_ENV
          echo "TF_VAR_vm_size=$CHOSEN_SKU"  >> $GITHUB_ENV

      # If a previous run failed mid-way, the resource group may already exist
      # in Azure but not in Terraform state. We delete it so Terraform starts clean.
      - name: Clean up existing resource group (if any)
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: |
          RG_NAME=$(grep 'resource_group_name' terraform/terraform.tfvars \
            | head -1 | cut -d'"' -f2)
          RG_NAME=${RG_NAME:-llm-eval-rg}

          if az group exists --name "$RG_NAME" --subscription "$ARM_SUBSCRIPTION_ID" \
              | grep -q true; then
            echo "Found existing resource group '$RG_NAME' — deleting for clean deploy..."
            az group delete --name "$RG_NAME" \
              --subscription "$ARM_SUBSCRIPTION_ID" --yes
            echo "Waiting for deletion..."
            while az group exists --name "$RG_NAME" \
                --subscription "$ARM_SUBSCRIPTION_ID" | grep -q true; do
              echo "  still deleting..."
              sleep 15
            done
            echo "Done — resource group removed."
          else
            echo "No existing resource group — clean deploy."
          fi

      - name: Terraform Plan
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply (or Destroy)
        working-directory: terraform
        run: |
          if [ "${{ github.event.inputs.destroy }}" == "true" ]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve tfplan
          fi

      - name: Extract VM IP and SSH key from Terraform
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: terraform
        id: get_ip
        run: |
          echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT
          # Extract the auto-generated private key — no SSH secret needed
          terraform output -raw private_key_pem > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # ── Docker deploy ────────────────────────────────────────────────────────
      - name: Write .env file
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"            >> .env

      - name: Install rsync
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: sudo apt-get install -y rsync

      - name: Add VM to known hosts
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: ssh-keyscan -H ${{ steps.get_ip.outputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Deploy with Docker
        if: ${{ github.event.inputs.destroy != 'true' }}
        run: bash deploy/docker_deploy.sh ${{ steps.get_ip.outputs.vm_ip }}

      - name: Upload evaluation results
        if: ${{ github.event.inputs.destroy != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: |
            outputs/*.csv
            outputs/meyar.db
          retention-days: 30
