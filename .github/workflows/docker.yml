name: Build, Provision & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  # ── Job 1: Build Docker image and push to Docker Hub ───────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: shadsahaddad11111/llm-eval-model
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Job 2: Terraform — create all Azure resources ──────────────────────────
  # First run: creates Container Apps, App Gateway, everything from scratch.
  # Re-runs: only updates what changed (idempotent).
  terraform:
    name: Terraform Provision
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Bootstrap Terraform remote state storage
        run: |
          # azure/login (subscription-id input) already sets the active
          # subscription. Don't re-set it from the raw secret — az account set
          # doesn't validate the value, so any stray whitespace/newline in the
          # secret produces SubscriptionNotFound on later commands.

          # Confirm which subscription is active (visible in the Actions log).
          echo "Active subscription:"
          az account show --query "{name:name, id:id, state:state}" -o json

          # A fresh subscription only auto-registers a few resource providers.
          # Microsoft.Resources (used by 'group create') is always on, but
          # Microsoft.Storage et al must be registered first — otherwise ARM
          # returns a misleading "SubscriptionNotFound" when routing to them.
          echo "Registering resource providers..."
          PROVIDERS="Microsoft.Storage Microsoft.App Microsoft.Network \
                     Microsoft.OperationalInsights Microsoft.ManagedIdentity"
          # Kick off all registrations (returns immediately)...
          for ns in $PROVIDERS; do
            az provider register --namespace "$ns"
          done
          # ...then block until each is fully Registered. One-time cost on a
          # fresh subscription; already-registered providers return instantly.
          # Terraform Apply below also needs Microsoft.App / Microsoft.Network.
          for ns in $PROVIDERS; do
            az provider register --namespace "$ns" --wait
          done

          az group create \
            --name llm-eval-tfstate-rg \
            --location westeurope || true

          # Create storage account only if it doesn't already exist
          if ! az storage account show \
              --name llmevaltfstate \
              --resource-group llm-eval-tfstate-rg \
              --output none 2>/dev/null; then
            az storage account create \
              --name llmevaltfstate \
              --resource-group llm-eval-tfstate-rg \
              --location westeurope \
              --sku Standard_LRS
          fi

          # Wait until the storage account is fully provisioned
          echo "Waiting for storage account to be ready..."
          for i in $(seq 1 12); do
            STATE=$(az storage account show \
              --name llmevaltfstate \
              --resource-group llm-eval-tfstate-rg \
              --query "provisioningState" -o tsv 2>/dev/null || echo "waiting")
            echo "  attempt $i — state: $STATE"
            [ "$STATE" = "Succeeded" ] && break
            sleep 10
          done

          az storage container create \
            --name tfstate \
            --account-name llmevaltfstate \
            --auth-mode login

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="hf_token=${{ secrets.HF_TOKEN }}"

      - name: Print deployment URLs
        working-directory: terraform
        run: |
          echo "================================================"
          echo "Public IP : $(terraform output -raw public_ip)"
          echo "API URL   : $(terraform output -raw api_url)"
          echo "Docs URL  : $(terraform output -raw api_docs_url)"
          echo "================================================"
