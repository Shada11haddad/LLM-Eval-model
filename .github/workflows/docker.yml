name: Build, Push & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Build & push image to Docker Hub ────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: shadsahaddad11111/llm-eval-model
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to Azure Container Apps (push to main only) ──────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App with new image
        run: |
          az containerapp update \
            --name llm-eval-api \
            --resource-group llm-eval-rg \
            --image shadsahaddad11111/llm-eval-model:latest

      - name: Wait for revision to be running
        run: |
          echo "Waiting for new revision..."
          for i in $(seq 1 20); do
            STATUS=$(az containerapp revision list \
              --name llm-eval-api \
              --resource-group llm-eval-rg \
              --query "[0].properties.runningState" -o tsv)
            echo "  State: $STATUS"
            [ "$STATUS" = "Running" ] && break
            sleep 15
          done

      - name: Health check via Application Gateway
        run: |
          APPGW_IP=$(az network public-ip show \
            --name llm-eval-appgw-pip \
            --resource-group llm-eval-rg \
            --query "ipAddress" -o tsv)

          echo "Testing http://$APPGW_IP/health ..."
          for i in $(seq 1 5); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$APPGW_IP/health")
            echo "  Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Deployment successful."
              echo "API : http://$APPGW_IP"
              echo "Docs: http://$APPGW_IP/docs"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed." && exit 1
