name: CI — Lint & Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          pip install loguru python-dotenv \
            langchain langchain-openai langchain-ollama langchain-text-splitters \
            faiss-cpu pandas tqdm openai numpy

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style
          flake8 src/ scripts/ config.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ scripts/ config.py \
            --count --max-line-length=120 --statistics --exit-zero

      - name: Validate imports
        run: |
          python -c "from config import cfg; print('config OK')"
          python -c "from src.evaluation.metrics import metrics_tracker; print('metrics OK')"
          python -c "from src.evaluation.parse_verdict import parse_judge_verdict; print('parse_verdict OK')"
          python -c "from src.utils.helpers import polite_sleep; print('helpers OK')"
