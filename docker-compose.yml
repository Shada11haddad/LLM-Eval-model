version: '3.8'

services:

  # Ollama — serves DeepSeek R1 7B and Llama 3.2
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models between runs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Pull models into Ollama before the app runs
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c",
      "ollama pull deepseek-r1:7b && ollama pull llama3.2"]
    restart: "no"

  # FastAPI server — query results + trigger evaluations
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    restart: unless-stopped

  # Batch evaluation run (runs once, then exits)
  app:
    build: .
    command: python scripts/run_full_evaluation.py
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    restart: "no"

volumes:
  ollama_data:
